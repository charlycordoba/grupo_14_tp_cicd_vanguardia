¡Perfecto, ahora sí tenemos el código a la vista! Vamos a dejarlo listo.

Para solucionar el error, solo tenemos que indicarle a GitHub Actions en qué carpeta debe pararse para ejecutar el comando npm install y npm test.

Suponiendo que tu carpeta con el proyecto de Node se llama, por ejemplo, app (cambiá app por el nombre real de tu carpeta), el código modificado tiene que quedar exactamente así:

YAML
name: Test del Proyecto

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Le indicamos a GitHub que corra todos los comandos dentro de tu carpeta
    defaults:
      run:
        working-directory: C:\Users\Administrador\Documents\git-proyect\git-vanguardia\web_test # <-- REEMPLAZÁ "app" POR EL NOMBRE REAL DE TU CARPETA

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar test
        run: npm test